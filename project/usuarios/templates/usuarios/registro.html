{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Crear Usuario</title>
</head>
<body>
    <header>
        {% include 'core/components/header.html' %}
    </header>
    <main class="main-form">
        <h2>Registro</h2>

        <form method="POST" enctype="multipart/form-data" class="form-registro">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Nombre de Usuario">
            <input type="password" name="password" placeholder="Contraseña">
            <input type="password" name="confirm_password" placeholder="Confirmar Contraseña">
            <input type="text" name="apellido" placeholder="Apellido">
            <input type="text" name="nombre" placeholder="Nombre">
            <input type="email" name="email" placeholder="Correo Electrónico">
            <input type="tel" name="telefono" placeholder="Teléfono">
            <input type="file" name="foto">

            <button type="submit" class="verde">Registrarse</button>
            {% if error %}
                <p style="color:red;">{{ error }}</p>
            {% endif %}
        </form>
        <a href="{% url 'usuarios:login' %}" class="link">Ya tengo cuenta</a> 
    </main>
    <footer>
        {% include 'core/components/footer.html' %}
    </footer>
</body>
</html>
