{% extends 'core/components/base.html' %}
{% load static %}

{% block title %}
    Perfil
{% endblock title %}

{% block content %}
    <main class="main-perfil">
        <h2>
            {{ usuario.username }}.
        </h2>
        {% if usuario.foto %}
            <img src="{{ usuario.foto.url }}" alt="Foto de {{ usuario.username }}" class="foto-perfil">
        {% endif %}
        <a href="{% url 'usuarios:editar-perfil' %}" class="link verde">Editar Datos</a>
    </main>
{% endblock content %}
