{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="icon" href="{% static 'img/icono-rutipal.png' %}">
    {% block link %}
    {% endblock link %}
    <title>
        {% block title %}
        {% endblock title %}
    </title>
</head>
<body>
    <header>
        {% include 'core/components/header.html' %}
    </header>
    {% block content %}
    {% endblock content %}
    <footer>
        {% include 'core/components/footer.html' %}
    </footer>

    {% block scripts %}
    {% endblock scripts %}
</body>
</html>
